<!DOCTYPE html>
<html lang="en">
<head>
<base href="../">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAUSE</title>
<meta name="description" content="">
<meta name="robots" content="index, follow">
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="stylesheet" href="css/style.css">
</head>
<body data-page="quiz">

<noscript>
  <div class="noscript-note">
    <strong>JavaScript is required.</strong> PAUSE renders its pages and runs all of its
    scoring inside your browser; that client-side design is what lets it collect and
    transmit nothing. With JavaScript disabled, neither the content nor the self-check
    can load. The full source is readable at github.com/anondo1969/pause.
  </div>
</noscript>

<div id="chrome-top"></div>

<main class="wrap" id="quiz-root">
  <header class="quiz-header">
    <div class="quiz-stage-label" id="stage-label"></div>
    <div class="progress">
      <span class="progress-num" id="progress-num"></span>
      <span class="progress-bar"><span class="progress-fill" id="progress-fill"></span></span>
    </div>
  </header>

  <div id="stage" aria-live="polite"></div>

  <nav class="nav" id="nav-controls" hidden>
    <button class="btn btn-ghost" id="btn-prev" type="button"></button>
    <button class="btn btn-primary" id="btn-next" type="button"></button>
  </nav>
</main>

<div id="chrome-bottom"></div>

<script src="js/markdown.js"></script>
<script src="js/app.js"></script>
<script src="js/scoring.js"></script>
<script src="js/quiz.js"></script>
</body>
</html>
